<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinematics: 3D Trajectory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-container { position: absolute; top: 20px; left: 20px; z-index: 10; width: 320px; max-width: 90vw; }
        .glass-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input[type=range] { accent-color: #3b82f6; }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui-container" class="glass-panel p-5 rounded-xl shadow-2xl">
        <h1 class="text-xl font-bold mb-2 text-blue-400">Trajectory of Point M</h1>
        <p class="text-xs text-gray-300 mb-4 font-mono">r(t) = (a·cos(ωt), b·sin(ωt), b·t)</p>

        <div class="space-y-4">
            <!-- Parameter A -->
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Amplitude a (X-axis)</label>
                    <span id="val-a" class="text-sm text-blue-300">5.0</span>
                </div>
                <input type="range" id="slider-a" min="1" max="10" step="0.1" value="5" class="w-full">
            </div>

            <!-- Parameter B -->
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Amplitude b (Y & Z axes)</label>
                    <span id="val-b" class="text-sm text-blue-300">3.0</span>
                </div>
                <input type="range" id="slider-b" min="1" max="10" step="0.1" value="3" class="w-full">
            </div>

            <!-- Parameter Omega -->
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Frequency ω</label>
                    <span id="val-omega" class="text-sm text-blue-300">2.0</span>
                </div>
                <input type="range" id="slider-omega" min="0.5" max="5" step="0.1" value="2" class="w-full">
            </div>

            <!-- Max Time -->
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium">Time length (t₀)</label>
                    <span id="val-t" class="text-sm text-blue-300">15.0</span>
                </div>
                <input type="range" id="slider-t" min="5" max="30" step="1" value="15" class="w-full">
            </div>

            <hr class="border-gray-600">

            <!-- Buttons -->
            <button id="btn-special" class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-semibold transition-colors duration-200">
                Set Special Case (a = b)
            </button>
            <p class="text-xs text-gray-400 text-center mt-2">Click and drag canvas to rotate 3D view.</p>
        </div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <script>
        // Simulation Parameters
        let params = {
            a: 5.0,
            b: 3.0,
            omega: 2.0,
            tMax: 15.0
        };

        // Three.js Variables
        let scene, camera, renderer;
        let sceneGroup; // Holds all rotating objects
        let trajectoryLine, particle;
        let time = 0; // For animation

        // Mouse Interaction Variables
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let currentRotation = { x: 0.3, y: -0.5 }; // Initial slight isometric tilt

        // Initialize App on Window Load
        window.onload = function() {
            initThreeJS();
            setupUI();
            updateTrajectory();
            animate();
        };

        function initThreeJS() {
            const container = document.getElementById('canvas-container');

            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a); // Tailwind slate-900

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 45); // Move camera back

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Group to hold our rotatable scene
            sceneGroup = new THREE.Group();
            scene.add(sceneGroup);

            // Apply initial rotation
            sceneGroup.rotation.x = currentRotation.x;
            sceneGroup.rotation.y = currentRotation.y;

            // 4. Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(20, 20, 20);
            scene.add(pointLight);

            // 5. Helpers (Grid and Axes)
            // Note: In Three.js, Y is UP. For physics, Z is usually UP. 
            // We will map Physics(Z) to ThreeJS(Y) visually.
            const gridHelper = new THREE.GridHelper(30, 30, 0x334155, 0x1e293b);
            gridHelper.position.y = -10; // Move floor down a bit
            sceneGroup.add(gridHelper);

            const axesHelper = new THREE.AxesHelper(15);
            axesHelper.position.y = -10;
            sceneGroup.add(axesHelper);

            // 6. Particle (The moving point M)
            const particleGeometry = new THREE.SphereGeometry(0.5, 16, 16);
            const particleMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x3b82f6, 
                emissive: 0x1d4ed8,
                roughness: 0.2,
                metalness: 0.8
            });
            particle = new THREE.Mesh(particleGeometry, particleMaterial);
            sceneGroup.add(particle);

            // 7. Event Listeners for Resize and Mouse
            window.addEventListener('resize', onWindowResize, false);
            setupMouseControls(container);
        }

        function setupMouseControls(element) {
            element.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.offsetX - previousMousePosition.x,
                        y: e.offsetY - previousMousePosition.y
                    };

                    currentRotation.x += deltaMove.y * 0.005;
                    currentRotation.y += deltaMove.x * 0.005;

                    // Clamp X rotation to prevent flipping upside down completely
                    currentRotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, currentRotation.x));

                    sceneGroup.rotation.x = currentRotation.x;
                    sceneGroup.rotation.y = currentRotation.y;

                    previousMousePosition = { x: e.offsetX, y: e.offsetY };
                }
            });

            // Touch support for mobile
            element.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }, {passive: true});

            window.addEventListener('touchend', () => { isDragging = false; });

            window.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const deltaMove = {
                        x: e.touches[0].clientX - previousMousePosition.x,
                        y: e.touches[0].clientY - previousMousePosition.y
                    };
                    currentRotation.x += deltaMove.y * 0.005;
                    currentRotation.y += deltaMove.x * 0.005;
                    currentRotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, currentRotation.x));
                    
                    sceneGroup.rotation.x = currentRotation.x;
                    sceneGroup.rotation.y = currentRotation.y;
                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            }, {passive: true});
        }

        function setupUI() {
            const updateUIValue = (id, val) => document.getElementById(id).innerText = parseFloat(val).toFixed(1);

            document.getElementById('slider-a').addEventListener('input', (e) => {
                params.a = parseFloat(e.target.value);
                updateUIValue('val-a', params.a);
                updateTrajectory();
            });

            document.getElementById('slider-b').addEventListener('input', (e) => {
                params.b = parseFloat(e.target.value);
                updateUIValue('val-b', params.b);
                updateTrajectory();
            });

            document.getElementById('slider-omega').addEventListener('input', (e) => {
                params.omega = parseFloat(e.target.value);
                updateUIValue('val-omega', params.omega);
                updateTrajectory();
            });

            document.getElementById('slider-t').addEventListener('input', (e) => {
                params.tMax = parseFloat(e.target.value);
                updateUIValue('val-t', params.tMax);
                updateTrajectory();
            });

            document.getElementById('btn-special').addEventListener('click', () => {
                // Set Special Case: a = b
                params.a = params.b;
                document.getElementById('slider-a').value = params.a;
                updateUIValue('val-a', params.a);
                updateTrajectory();
            });
        }

        function updateTrajectory() {
            // Remove old line if it exists
            if (trajectoryLine) {
                sceneGroup.remove(trajectoryLine);
                trajectoryLine.geometry.dispose();
                trajectoryLine.material.dispose();
            }

            const points = [];
            const steps = 500; // Resolution of the curve
            
            for (let i = 0; i <= steps; i++) {
                const t = (i / steps) * params.tMax;
                
                // Physics Equation: r(t) = (a*cos(wt), b*sin(wt), b*t)
                // Mapping to Three.js coordinates where Y is UP:
                // Three.X = Physics.X
                // Three.Y = Physics.Z (offset by -10 to start at grid)
                // Three.Z = Physics.Y 
                const x = params.a * Math.cos(params.omega * t);
                const y = (params.b * t) - 10; 
                const z = params.b * Math.sin(params.omega * t);

                points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: 0x60a5fa, // Tailwind blue-400
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });

            trajectoryLine = new THREE.Line(geometry, material);
            sceneGroup.add(trajectoryLine);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Animate the particle along the curve
            time += 0.05; // Animation speed
            if (time > params.tMax) {
                time = 0; // Loop back to start
            }

            // Calculate current position based on physics equation
            const currentX = params.a * Math.cos(params.omega * time);
            const currentY = (params.b * time) - 10;
            const currentZ = params.b * Math.sin(params.omega * time);

            particle.position.set(currentX, currentY, currentZ);

            // Render scene
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
